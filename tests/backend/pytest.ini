[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

# Trata warnings como erro para detectar problemas cedo. Sem exceções por enquanto
# (a migração de python-jose para PyJWT eliminou o DeprecationWarning de datetime).
filterwarnings =
    error
    # Ignora avisos de bibliotecas de terceiros que não controlamos, se surgirem:
    ignore::DeprecationWarning:httpx.*
