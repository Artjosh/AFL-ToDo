name: CI

# Roda lint + testes a cada push e pull request na main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala dependências
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff — PEP8)
        run: ruff check .

      - name: Formatação (ruff format)
        run: ruff format --check .

      - name: Testes (pytest)
        working-directory: tests/backend
        run: python -m pytest -q

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instala dependências
        run: npm ci

      - name: Testes (vitest)
        run: npm test

      - name: Build de produção
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # O Playwright sobe backend + frontend; preparamos as três pastas.
      - name: Cria venv do backend (usada pelo Playwright)
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements-dev.txt

      - name: Instala deps do frontend
        working-directory: frontend
        run: npm ci

      - name: Instala deps do E2E
        working-directory: tests/e2e
        run: npm ci

      - name: Instala navegador do Playwright
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Roda os testes E2E
        working-directory: tests/e2e
        run: npx playwright test

      - name: Sobe o relatório em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
